name: "install with cpm"
description: "install Perl Modules using App::cpm"
branding:
  icon: "arrow-right"
  color: "blue"
inputs:
  install:
    description: "List of modules or distributions to install [separated by newline]"
    required: false

  cpanfile:
    description: "Use a cpanfile to install modules"
    required: false

  tests:
    description: "Run or not the unit tests"
    required: false
    default: false

  global:
    description: "Perform a global or local installation: -g"
    required: false
    default: true

  args:
    description: "Extra args passed to the install command, one per line (newline-delimited, like the install input). This allows argument values containing spaces."
    required: false

  sudo:
    description: "Perform installations as root"
    required: false
    default: true

  verbose:
    description: "Run cpm with -v flag or not"
    required: false
    default: false

  perl:
    description: "Path of perl to use, defaults to current PATH"
    required: false
    default: "perl"

  path:
    description: "Path where to install cpm: the string can use $Config values"
    required: false
    default: "$Config{installsitescript}/cpm"

  workers:
    description: "Number of parallel workers for cpm downloads (e.g. 5). Leave empty to use cpm default."
    required: false
    default: ""

  mirror:
    description: "Specify a CPAN mirror URL to use with --mirror"
    required: false

  snapshot:
    description: "Path to cpanfile.snapshot for snapshot-based installs (requires Carton::Snapshot). Leave empty to skip."
    required: false
    default: ""

  version:
    description: "Which version to install"
    required: false
    default: "main"

  checksum:
    description: >
      Expected SHA-256 hex digest of the cpm script. When set, the action
      verifies the downloaded (or cached) script matches this hash before
      installation and fails if there is a mismatch.  Leave empty to skip
      verification (the computed hash is still logged for auditability).
    required: false
    default: ""

  retries:
    description: >
      Number of additional attempts after a cpm failure. 0 disables the
      retry loop (single attempt, historical behavior). Intended to
      absorb transient upstream failures (e.g. metacpan 599 / connection
      timed out) without flaking the job.
    required: false
    default: "2"

  retry-wait:
    description: >
      Base delay in seconds between attempts. Applied with linear
      backoff: attempt N waits retry-wait * N seconds before the next
      attempt (e.g. 20s, 40s, 60s with the default).
    required: false
    default: "20"

outputs:
  cpm-path:
    description: "Absolute path where cpm was installed"
  cache-hit:
    description: "Whether the cpm script was restored from cache (true/false)"

runs:
  using: "node24"
  main: "dist/index.js"
